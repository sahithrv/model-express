server:
  host: "127.0.0.1"
  port: 8080

database:
  driver: "sqlite"
  dsn: "artifacts/model-express.sqlite3"

mlflow:
  tracking_uri: "http://127.0.0.1:5000"
  default_experiment_name: "model-express-local"

worker:
  heartbeat_timeout_seconds: 30
  max_concurrent_jobs: 1

training:
  default_metric: "macro_f1"
  max_epochs: 15
