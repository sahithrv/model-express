server:
  host: "127.0.0.1"
  port: 8080

database:
  driver: "postgres"
  dsn: "postgres://model_express:model_express@localhost:5432/model_express?sslmode=disable"

mlflow:
  tracking_uri: "http://127.0.0.1:5000"
  default_experiment_name: "model-express-local"

object_storage:
  provider: "minio"
  endpoint: "http://127.0.0.1:9000"
  bucket: "model-express"
  access_key: "model_express"
  secret_key: "model_express_password"
  use_ssl: false

worker:
  heartbeat_timeout_seconds: 30
  max_concurrent_jobs: 1

constraints:
  max_workers: 2
  max_experiments: 6
  max_runtime_minutes: 60
  allowed_templates:
    - "simple_cnn"
    - "mobilenet_transfer"
    - "resnet_transfer"

allocation_modes:
  cheap:
    target_workers: 2
    pruning_aggressiveness: "high"
  balanced:
    target_workers: 4
    pruning_aggressiveness: "medium"
  fast:
    target_workers: 8
    pruning_aggressiveness: "low"

training:
  default_metric: "macro_f1"
  max_epochs: 15
