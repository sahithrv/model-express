services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: model_express
      POSTGRES_PASSWORD: model_express
      POSTGRES_DB: model_express
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts

volumes:
  postgres-data:
  mlflow-artifacts:
