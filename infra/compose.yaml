services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: model_express
      POSTGRES_PASSWORD: model_express
      POSTGRES_DB: model_express
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts

  minio:
    image: quay.io/minio/minio:latest
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    environment:
      MINIO_ROOT_USER: model_express
      MINIO_ROOT_PASSWORD: model_express_password
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  mlflow-artifacts:
  minio-data:
